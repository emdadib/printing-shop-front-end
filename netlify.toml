[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
   VITE_API_URL = "https://printing-shop-backend-fjm2hbzd2a-as.a.run.app/api"
  VITE_APP_NAME="SB Shop"
  VITE_APP_VERSION="0.0.1"
  VITE_ENVIRONMENT="production"


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://printing-shop-backend-fjm2hbzd2a-as.a.run.app/api"

[context.deploy-preview.environment]
  VITE_API_URL = "https://printing-shop-backend-fjm2hbzd2a-as.a.run.app/api"
