[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"



[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  VITE_API_URL = "https://priting-shop-back-end.onrender.com"

[context.deploy-preview.environment]
  VITE_API_URL = "https://priting-shop-back-end.onrender.com"
